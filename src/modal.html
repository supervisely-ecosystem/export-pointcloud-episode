<sly-field title="Download options" description="Select what to download">
    <div class="mt10">
        <el-checkbox v-model="state.download_pcd">Point clouds (PCD, LAS, LAZ, PLY)</el-checkbox>
    </div>
    <div class="mt10">
        <el-checkbox v-model="state.download_annotation" disabled>Annotations (JSON)</el-checkbox>
    </div>
    <div class="mt10">
        <el-checkbox v-model="state.download_photocontext">Context images (JPG, PNG)</el-checkbox>
    </div>
</sly-field>
